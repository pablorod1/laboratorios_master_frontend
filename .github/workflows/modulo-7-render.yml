name: Validate and deploy modulo 7 Docker to Render

on:
  push:
    branches:
      - main
    paths:
      - 'modulo_7/**'
      - 'render.yaml'
      - '.github/workflows/modulo-7-render.yml'
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Build Docker image
        uses: docker/build-push-action@v7.3.0
        with:
          context: modulo_7
          file: modulo_7/Dockerfile
          push: false
          tags: modulo-7-render:ci
          build-args: |
            BASE_PATH=/

      - name: Trigger Render deploy hook
        if: ${{ env.RENDER_DEPLOY_HOOK_URL != '' }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Skip Render deploy hook
        if: ${{ env.RENDER_DEPLOY_HOOK_URL == '' }}
        run: echo "Set the RENDER_DEPLOY_HOOK_URL repository secret to trigger Render deploys from this workflow."
